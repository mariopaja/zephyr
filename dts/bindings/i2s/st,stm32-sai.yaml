description: STM32 SAI Block controller

compatible: "st,stm32-sai"

include: base.yaml

properties:
  reg:
    required: true

  ranges:
    type: array
    required: true

  clock-names:
    required: true
    enum:
      - "sai_ck"
      - "sai_ker_ck"
      - "sai_a_ker_ck"
      - "sai_b_ker_ck"
    description: |
      Expected names are the following:
      - "sai_ker_ck" for configuring a shared SAI A and B kernel clock
      - "sai_a_ker_ck" for configuring a SAI A kernel clock
      - "sai_b_ker_ck" for configuring a SAI B kernel clock
      Depending on the platform, SAI A and B nodes may use either a shared
      or a dedicated kernel clocks. This parameter identifies which kernel
      clock configuration applies.

  "#address-cells":
    const: 1

  "#size-cells":
    const: 1

child-binding:
  description: SAI Sub-Block instances linked to SAI Block Controller

  include:
    - name: pinctrl-device.yaml
    - name: i2s-controller.yaml
      property-blocklist: [compatible]

  properties:
    reg:
      required: true

    dmas:
      required: true

    dma-names:
      required: true
      description: |
        DMA channel name: "tx" or "rx", depending of expected device behavior.
      enum: [tx, rx]

    pinctrl-0:
      required: true

    pinctrl-names:
      required: true

    mclk-enable:
      type: boolean
      description: |
        Master Clock Output function.
        An mck pin must be listed within pinctrl-0 when enabling this property.

    mclk-divider:
      type: string
      default: "no-div"
      description: |
        Master Clock Divider Configuration.

        When no-div property is present:
        - MCKDIV = SAI_CK_x / (FS * (FRL + 1))
        Otherwise:
        - MCKDIV = SAI_CK_x / (FS * (OSR + 1) * 256)

        When div-256 is present OSR is set to 0.
        When div-512 is present OSR is set to 1.
      enum:
        - "no-div"
        - "div-256"
        - "div-512"

    synchronous:
      type: boolean
      description: |
        Synchronous mode.
        When present, the SAI controller is configured to work in synchronous mode.

    fifo-threshold:
      type: string
      default: "full"
      description: |
        SAI Block Fifo Threshold defines the fill level at which the peripheral
        triggers a DMA request or interrupt to transfer data
      enum:
        - "empty"
        - "1/4"
        - "1/2"
        - "3/4"
        - "full"
